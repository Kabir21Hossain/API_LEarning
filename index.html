<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trees | Details Fetching</title>

    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
        }

        .main {
            min-height: 100vh;
            margin: 0 auto;
        }

        .trees {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
        }

        .tree-card .card {
            width: 100%;
        }

        .category-panel,
        .cart-panel {
            position: static;
        }

        @media (min-width: 768px) {

            .category-panel,
            .cart-panel {
                width: 300px;
                position: sticky;
                top: 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- <div id="page-loader" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
        <div class="flex flex-col items-center gap-3 rounded-xl bg-white/90 p-6 shadow-xl">
            <span class="loading loading-dots loading-xl text-green-600"></span>
            <p class="text-lg font-semibold text-gray-800">Loading content...</p>
        </div>
    </div> -->

    <section class="main grid grid-cols-1 gap-4 p-4 bg-gray-100 lg:grid-cols-[280px_minmax(0,1fr)_320px]">
        <!-- categories -->
        <div
            class="category-panel categories order-1 lg:order-none w-full px-4 py-10 shadow-xl flex flex-row flex-wrap lg:flex-col gap-2 justify-start bg-white rounded-lg">
            <h2 id="category-title" class="text-2xl font-bold mb-4"></h2>
        </div>

        <!-- trees -->
        <div class="order-2 lg:order-none w-full py-4 shadow-xl bg-white rounded-lg">
            <h2 class="text-center text-4xl sm:text-5xl md:text-6xl text-green-400 font-extrabold">Choose your Trees
            </h2>

            <div id="tree-loader" class="flex hidden flex-col items-center justify-center py-10">
                <span class="loading loading-dots loading-xl"></span>
                <p class="mt-4 text-center text-lg font-medium text-gray-600">Loading trees...</p>
            </div>
            <div class="trees my-10 px-2 sm:px-4"></div>
        </div>

        <!-- cart -->
        <div class="cart-panel order-3 lg:order-none w-full py-10 px-4 shadow-xl bg-white rounded-lg">
            <div class="head flex items-center justify-between mb-4">
                <h2 id="cart-title" class="text-4xl font-bold mb-4">Cart</h2>
                <div class="flex items-center gap-3 relative">
                    <span id="cart-badge"
                        class="badge badge-secondary text-lg absolute -top-4 -right-8 rounded-full w-10 h-10">0</span>
                    <span><i class="fa-solid fa-cart-arrow-down fa-2x"></i></span>
                </div>
            </div>

            <div class="cart">
                <div class="empty-cart text-center py-10">
                    <p class="text-gray-500 text-center text-lg">Your cart is empty</p>
                    <p class="text-center text-lg">Add Trees to get started</p>
                </div>

                <div class="cart-items"></div>

                <div
                    class="total flex flex-col sm:flex-row justify-between items-center mt-4 px-4 py-6 shadow-md bg-green-100 rounded gap-3">
                    <p class="text-xl font-bold">Total:</p>
                    <p id="total-price" class="text-xl font-bold">$0.00</p>
                </div>
            </div>
        </div>
    </section>


    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
    <dialog id="my_modal_1" class="modal">
        <form method="dialog" class="modal-box relative">
            <button type="submit" class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" aria-label="Close modal">✕</button>
            <div id="modal-content"></div>
            <div class="modal-action">
                <button class="btn">Close</button>
            </div>
        </form>
    </dialog>





    <script src="script.js"></script>
</body>

</html>
