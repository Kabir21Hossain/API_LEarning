<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trees | Details Fetching</title>

    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>

<body>

    <section class="main flex flex-col md:flex-row gap-4 p-4 bg-gray-100">
        <!-- categories -->
        <div
            class="categories w-full min-h-100 md:w-1/5 md:min-h-screen px-4 py-10 shadow-xl flex flex-col gap-2 justify-start fixed z-100 top-0 left-0 bg-white">
            <h2 id="category-title" class="text-2xl font-bold mb-4"></h2>
        </div>

        <!-- trees -->
        <div class=" w-full min-h-100 md:w-3/4 md:min-h-screen py-4 shadow-xl md:ml-[20%] md:mr-[20%] bg-white">
            <h2 class="text-center text-6xl text-green-400 font-extrabold">Choose your Trees</h2>
            <div class="trees flex flex-wrap gap-3 my-10 px-4"></div>
        </div>

        <!-- cart -->
        <div class="w-full min-h-100 md:w-1/5 md:min-h-screen py-10 px-4 shadow-xl fixed right-0 top-0 bg-white z-100">
            <div class="head flex items-center justify-between mb-4">
                <h2 id="cart-title" class="text-4xl font-bold mb-4">Cart</h2>
                <span><i class="fa-solid fa-cart-arrow-down fa-2x"></i></span>
            </div>

            <div class="cart">
                <div class="empty-cart text-center py-10">
                    <p class="text-gray-500 text-center text-lg">Your cart is empty</p>
                    <p class="text-center text-lg">Add Trees to get started</p>
                </div>

                <div class="cart-items"></div>

                <div class="total flex justify-between items-center mt-4 px-4 py-6 shadow-md bg-green-100 rounded">
                    <p class="text-xl font-bold mt-4">Total:</p>
                    <p id="total-price" class="text-xl font-bold mt-2">$0.00</p>
                </div>

            </div>
        </div>
    </section>


    





    <script src="script.js"></script>
</body>

</html>
